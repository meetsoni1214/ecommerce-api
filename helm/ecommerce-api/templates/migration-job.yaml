{{- if .Values.migrationJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "ecommerce-api.fullname" . }}-migrate
  labels:
    {{- include "ecommerce-api.labels" . | nindent 4 }}
  {{- if .Values.migrationJob.useHelmHook }}
  annotations:
    helm.sh/hook: {{ .Values.migrationJob.hookEvents | quote }}
    helm.sh/hook-delete-policy: before-hook-creation
  {{- end }}
spec:
  backoffLimit: {{ .Values.migrationJob.backoffLimit }}
  template:
    metadata:
      labels:
        {{- include "ecommerce-api.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: migrate
    spec:
      restartPolicy: OnFailure
      {{- if .Values.postgresql.enabled }}
      initContainers:
        - name: wait-for-postgres
          image: "{{ .Values.postgresql.image.repository }}:{{ .Values.postgresql.image.tag }}"
          imagePullPolicy: {{ .Values.postgresql.image.pullPolicy }}
          command:
            - sh
            - -c
            - 'until pg_isready -h {{ include "ecommerce-api.postgresql.fullname" . }} -U {{ .Values.postgresql.auth.username }}; do echo "waiting for postgres"; sleep 2; done'
      {{- end }}
      containers:
        - name: migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - ./node_modules/.bin/prisma
            - migrate
            - deploy
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "ecommerce-api.secretName" . }}
                  key: DATABASE_URL
{{- end }}
