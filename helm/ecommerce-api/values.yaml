replicaCount: 1

image:
  repository: ecommerce-learn-api
  tag: latest
  pullPolicy: Never

nameOverride: ""
fullnameOverride: ""

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

config:
  port: "3000"
  azureStorageContainer: product-images

secrets:
  create: true
  existingSecret: ""
  databaseUrl: ""
  azureStorageConnectionString: ""

postgresql:
  enabled: true
  image:
    repository: postgres
    tag: 16-alpine
    pullPolicy: IfNotPresent
  auth:
    username: postgres
    password: postgres
    database: ecommerce
  service:
    port: 5432
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""

azurite:
  enabled: true
  image:
    repository: mcr.microsoft.com/azure-storage/azurite
    tag: latest
    pullPolicy: IfNotPresent
  service:
    port: 10000
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""

ingress:
  enabled: false
  className: nginx
  annotations: {}
  hosts:
    - host: ecommerce.com
      paths:
        - path: /
          pathType: Prefix
  tls: []

resources: {}

podSecurityContext: {}

securityContext: {}

readinessProbe:
  path: /health
  initialDelaySeconds: 5
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3

livenessProbe:
  path: /health
  initialDelaySeconds: 15
  periodSeconds: 20
  timeoutSeconds: 3
  failureThreshold: 3

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

migrationJob:
  enabled: false
  useHelmHook: true
  hookEvents: post-install,post-upgrade
  backoffLimit: 3
