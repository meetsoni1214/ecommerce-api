name: Deploy ecommerce API

run-name: Deploy ${{ github.sha }} to production

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy.yml"
      - ".dockerignore"
      - "Dockerfile"
      - "package.json"
      - "pnpm-lock.yaml"
      - "nest-cli.json"
      - "tsconfig.json"
      - "tsconfig.build.json"
      - "src/**"
      - "prisma/**"
      - "helm/ecommerce-api/**"
  workflow_dispatch:

permissions:
  contents: read

env:
  AZURE_CORE_OUTPUT: none
  ACR_NAME: learnk8snow
  IMAGE_REPOSITORY: learnk8snow.azurecr.io/ecommerce-api
  ACR_REPOSITORY: ecommerce-api
  AKS_RESOURCE_GROUP: learn-aks
  AKS_CLUSTER_NAME: ecommerce-api
  HELM_RELEASE: ecommerce-api
  HELM_NAMESPACE: default
  HEALTH_URL: http://ecommerce-api.20.204.215.164.nip.io/health

jobs:
  publish:
    name: Build and publish image
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    concurrency:
      group: ecommerce-api-publish
      cancel-in-progress: true

    outputs:
      image_tag: ${{ steps.image.outputs.tag }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.21.0

      - name: Validate Helm chart
        run: |
          helm lint helm/ecommerce-api --values helm/ecommerce-api/values.aks-prod.yaml
          helm template ecommerce-api helm/ecommerce-api \
            --namespace "$HELM_NAMESPACE" \
            --values helm/ecommerce-api/values.aks-prod.yaml \
            > /dev/null

      - name: Record immutable image tag
        id: image
        run: echo "tag=$GITHUB_SHA" >> "$GITHUB_OUTPUT"

      - name: Build image
        run: docker build --pull --tag "$IMAGE_REPOSITORY:$GITHUB_SHA" .

      - name: Log in to Azure as publisher
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_PUBLISHER_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Push image to ACR
        run: |
          az acr login --name "$ACR_NAME"
          docker push "$IMAGE_REPOSITORY:$GITHUB_SHA"

      - name: Verify published image
        run: |
          az acr repository show \
            --name "$ACR_NAME" \
            --image "$ACR_REPOSITORY:$GITHUB_SHA" \
            --query "{digest:digest,createdTime:createdTime}" \
            --output table

  deploy:
    name: Deploy to AKS
    needs: publish
    runs-on: ubuntu-latest

    environment:
      name: production
      url: http://ecommerce-api.20.204.215.164.nip.io

    permissions:
      contents: read
      id-token: write

    concurrency:
      group: ecommerce-api-production
      cancel-in-progress: false

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Log in to Azure as deployer
        uses: azure/login@v3
        with:
          client-id: ${{ vars.AZURE_DEPLOYER_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS context
        uses: azure/aks-set-context@v5
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}
          admin: "false"

      - name: Set up Helm
        uses: azure/setup-helm@v5
        with:
          version: v3.21.0

      - name: Deploy immutable image
        env:
          IMAGE_TAG: ${{ needs.publish.outputs.image_tag }}
        run: |
          helm upgrade --install "$HELM_RELEASE" helm/ecommerce-api \
            --namespace "$HELM_NAMESPACE" \
            --values helm/ecommerce-api/values.aks-prod.yaml \
            --set-string "image.repository=$IMAGE_REPOSITORY" \
            --set-string "image.tag=$IMAGE_TAG" \
            --atomic \
            --wait \
            --timeout 5m \
            --history-max 10

      - name: Show migration status
        if: always()
        run: |
          kubectl get job "$HELM_RELEASE-migrate" \
            --namespace "$HELM_NAMESPACE" \
            --output wide || true
          kubectl get pods \
            --namespace "$HELM_NAMESPACE" \
            --selector "job-name=$HELM_RELEASE-migrate" \
            --output wide || true
          kubectl logs "job/$HELM_RELEASE-migrate" \
            --namespace "$HELM_NAMESPACE" \
            --all-containers=true \
            --prefix=true \
            --pod-running-timeout=10s || true

      - name: Verify public health endpoint
        run: |
          for attempt in $(seq 1 12); do
            if curl --fail --silent --show-error --max-time 10 "$HEALTH_URL"; then
              exit 0
            fi

            echo "Health check attempt $attempt failed; retrying in 5 seconds"
            sleep 5
          done

          echo "Health endpoint did not become available"
          exit 1

      - name: Show deployment status
        if: always()
        run: helm status "$HELM_RELEASE" --namespace "$HELM_NAMESPACE" || true
