apiVersion: batch/v1
kind: Job
metadata:
  name: ecommerce-migrate
  namespace: default
  labels:
    app: ecommerce-migrate
spec:
  backoffLimit: 1
  template:
    metadata:
      labels:
        app: ecommerce-migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - 'until pg_isready -h postgres -U postgres; do echo "waiting for postgres"; sleep 2; done'
      containers:
        - name: migrate
          image: ecommerce-learn-api:latest
          imagePullPolicy: Never
          command:
            - ./node_modules/.bin/prisma
            - migrate
            - deploy
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: POSTGRES_PORT
            - name: DATABASE_URL
              value: "postgresql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)?schema=public"
